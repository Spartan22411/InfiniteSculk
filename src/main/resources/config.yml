# Configurare InfiniteSculk

# Activeaza sau dezactiveaza complet functionalitatea pluginului
enabled: true

# Daca este true, ignora XP-ul real lasat de mob si foloseste direct charge-power
bypass-xp-requirement: true

# Multiplicator de viteza folosit cand bypass-xp-requirement este false
spread-speed-multiplier: 2

# Puterea de incarcare (charge) injectata cand bypass-xp-requirement este true
charge-power: 1000

# Numarul maxim de re-injectari de charge permise per catalizator, inainte de a lasa
# raspandirea sa se opreasca natural. Limiteaza cat de mult se poate extinde sculk-ul
# dintr-un singur eveniment de moarte, ca sa nu consume tot terenul din jur la nesfarsit.
max-reblooms-per-catalyst: 500
