# Configurare InfiniteSculk v2.0

# Activeaza sau dezactiveaza complet extinderea automata a sculk-ului
enabled: true

# Raza (in blocuri) in jurul fiecarui jucator in care se cauta sculk de extins.
# Mai mare = sculk-ul se extinde si mai departe de jucator, dar costa mai mult CPU.
# Recomandat: 30-50. Maxim permis: 100.
search-radius: 40

# Cate blocuri se convertesc in sculk la fiecare pas al task-ului (per total, toti jucatorii).
# Mai mare = extindere mai rapida, dar mai mult impact pe server.
# Recomandat: 32-128.
blocks-per-tick: 64

# La cate tick-uri ruleaza task-ul de extindere (20 tick-uri = 1 secunda).
# Mai mic = extindere mai deasa/rapida. 1 = cel mai agresiv. Recomandat: 2-4.
task-interval-ticks: 2
